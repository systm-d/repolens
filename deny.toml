# cargo-deny configuration
# Schema: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[licenses]
# Licences explicitly accepted for direct and transitive deps
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
    # Transitive deps:
    "BlueOak-1.0.0",        # metrics-prometheus
    "CDLA-Permissive-2.0",  # webpki-roots
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Fail on multiple versions of the same crate (warn-only — common in the ecosystem)
multiple-versions = "warn"
# Disallow wildcard version requirements (e.g. version = "*")
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Block unknown registries (anything other than crates.io)
unknown-registry = "deny"
# Allow git deps (none currently used)
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[advisories]
# Default mode is to deny all advisories; we explicitly ignore individual ones below.
ignore = [
    # number_prefix is unmaintained, transitive via indicatif. Indicatif itself is
    # actively maintained but pins to an unmaintained dep. No security impact —
    # it's a Display/Debug helper for byte counts.
    "RUSTSEC-2025-0119",
]
