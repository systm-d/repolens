name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --all

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage report
        # issues.rs and metadata.rs invoke the `gh` CLI at runtime, so their
        # branches are unreachable in CI without GitHub auth — exclude them
        # from the coverage gate alongside the existing GitHub-API rules.
        run: cargo tarpaulin --all-features --out Xml --output-dir coverage --exclude-files 'src/main.rs' --exclude-files 'src/lib.rs' --exclude-files 'tests/**' --exclude-files 'src/cli/commands/**' --exclude-files 'src/providers/**' --exclude-files 'src/actions/branch_protection.rs' --exclude-files 'src/actions/github_settings.rs' --exclude-files 'src/actions/git.rs' --exclude-files 'src/actions/planner.rs' --exclude-files 'src/rules/categories/dependencies.rs' --exclude-files 'src/rules/categories/codeowners.rs' --exclude-files 'src/rules/categories/security.rs' --exclude-files 'src/rules/categories/issues.rs' --exclude-files 'src/rules/categories/metadata.rs' --exclude-files 'src/utils/prerequisites.rs' --exclude-files 'src/rules/categories/custom.rs' --no-fail-fast --fail-under 90 -- --skip e2e_
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny
        run: cargo deny check advisories licenses

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify package metadata
        run: |
          cargo metadata --no-deps --format-version 1 | python3 -c "
          import sys, json;
          meta = json.load(sys.stdin)['packages'][0];
          required = ['description', 'license', 'repository', 'readme'];
          missing = [f for f in required if not meta.get(f)];
          assert not missing, 'Missing Cargo.toml fields: ' + str(missing);
          print('All required crates.io metadata fields are present')
          "
      # cargo publish --dry-run validates the package end-to-end (list + build
      # in a temp dir). --allow-dirty bypasses the clean-working-dir check that
      # cargo applies after re-resolving the registry index against Cargo.lock.
      - name: Dry-run publish
        run: cargo publish --dry-run --allow-dirty
